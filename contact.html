<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>PUZZ · contact</title>
  <!-- Meta Tags -->
  <meta name="title" content="PUZZ · contact – tell your story">
  <meta name="description" content="Get in touch with Puzz photography for weddings, burials, birthdays, anniversaries, and any life moment you want framed forever.">
  <meta name="keywords" content="contact photographer, book wedding photographer, Accra photographer, inquiry, Puzz team, photography booking">
  <meta name="author" content="Puzz Team">
  <meta property="og:type" content="website">
  <meta property="og:url" content="https://www.puzz.photo/contact">
  <meta property="og:title" content="PUZZ · contact">
  <meta property="og:description" content="Get in touch with Puzz photography for weddings, burials, birthdays, anniversaries, and any life moment you want framed forever.">
  <meta property="og:image" content="./images/logo.jpeg">
  <meta property="twitter:card" content="summary_large_image">

  <!-- Favicon (same as index) -->
  <link rel="shortcut icon" href="./images/logo.jpeg" type="image/x-icon">

  <!-- Font Awesome, Google Fonts, Swiper (just in case) -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,600;14..32,700;14..32,800&family=Playfair+Display:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
  <style>
    /* ----- RESET & GLOBAL (same as index/gallery) ----- */
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html { scroll-behavior: auto; }
    body {
      font-family: 'Inter', sans-serif;
      background-color: #0b0b0b;
      color: #f5f5f5;
      overflow-x: hidden;
      line-height: 1.5;
    }
    section { padding: 6rem 2rem; position: relative; }
    .container { max-width: 1300px; margin: 0 auto; }
    h2 {
      font-size: clamp(2.5rem, 6vw, 4.5rem);
      font-family: 'Playfair Display', serif;
      margin-bottom: 2rem;
    }
    h2 span { color: #d4af37; }
    .btn {
      display: inline-block;
      background: transparent;
      border: 1px solid rgba(245,245,245,0.3);
      color: #f5f5f5;
      padding: 0.9rem 2.8rem;
      font-weight: 600;
      text-decoration: none;
      border-radius: 50px;
      backdrop-filter: blur(4px);
      transition: all 0.3s;
      cursor: pointer;
    }
    .btn-gold {
      background: #d4af37;
      border-color: #d4af37;
      color: #0b0b0b;
    }
    .btn-gold:hover {
      background: transparent;
      color: #d4af37;
    }

    /* ----- NAVBAR (exact copy from index) ----- */
    .navbar {
      position: fixed;
      top: 1.5rem;
      left: 50%;
      transform: translateX(-50%);
      width: 90%;
      max-width: 1300px;
      padding: 1rem 2.5rem;
      display: flex;
      justify-content: space-between;
      align-items: center;
      z-index: 1000;
      border-radius: 80px;
      background: rgba(10,10,10,0.15);
      backdrop-filter: blur(15px);
      border: 1px solid rgba(212,175,55,0.15);
      transition: background 0.3s, border-color 0.3s;
    }
    .navbar.scrolled { background: rgba(0,0,0,0.7); border-color: rgba(212,175,55,0.4); }
    .logo {
      font-size: 2.2rem;
      font-weight: 800;
      background: linear-gradient(145deg, #fff 20%, #d4af37 90%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      letter-spacing: -1px;
    }
    .nav-links { display: flex; gap: 3.5rem; }
    .nav-links a {
      text-decoration: none;
      color: #fff;
      font-weight: 600;
      font-size: 1rem;
      text-transform: uppercase;
      letter-spacing: 1px;
      position: relative;
    }
    .nav-links a::after {
      content: '';
      position: absolute;
      bottom: -4px;
      left: 0;
      width: 0;
      height: 2px;
      background: #d4af37;
      transition: width 0.3s;
    }
    .nav-links a:hover::after { width: 100%; }
    .hamburger {
      display: none;
      flex-direction: column;
      cursor: pointer;
      z-index: 1100;
    }
    .hamburger span { width: 32px; height: 2px; background: #d4af37; margin: 5px 0; }
    .mobile-menu {
      position: fixed;
      top: 0;
      right: -100%;
      width: 70%;
      max-width: 350px;
      height: 100vh;
      background: rgba(0,0,0,0.95);
      backdrop-filter: blur(25px);
      z-index: 1050;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      gap: 2.5rem;
      transition: right 0.5s;
      border-left: 2px solid #d4af37;
    }
    .mobile-menu.active { right: 0; }
    .mobile-menu a { color: white; font-size: 2rem; font-family: 'Playfair Display', serif; text-decoration: none; }
    .close-btn { position: absolute; top: 2rem; right: 2rem; font-size: 3rem; color: #d4af37; cursor: pointer; }
    @media (max-width: 900px) { .nav-links { display: none; } .hamburger { display: flex; } }

    /* ---------- GALLERY HERO (unique) ---------- */
    .gallery-hero {
      height: 60vh;
      min-height: 500px;
      position: relative;
      overflow: hidden;
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
    }
    .gallery-hero-bg {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      z-index: 0;
    }
    .gallery-hero-bg img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      filter: brightness(0.5) saturate(1.2);
    }
    .gallery-hero .hero-overlay {
      position: absolute;
      top: 0; left: 0; width: 100%; height: 100%;
      background: radial-gradient(circle at center, transparent 0%, #0b0b0b 90%);
      z-index: 1;
    }
    .gallery-hero-content {
      position: relative;
      z-index: 2;
      max-width: 900px;
      padding: 0 1rem;
    }
    .gallery-hero-content h1 {
      font-size: clamp(3rem, 10vw, 7rem);
      font-family: 'Playfair Display', serif;
      margin-bottom: 1rem;
      text-shadow: 0 5px 15px #000;
    }
    .gallery-hero-content p {
      font-size: 1.5rem;
      font-weight: 300;
      margin-bottom: 2rem;
      opacity: 0.9;
    }

    /* ----- CONTACT MAIN SECTION (split) ----- */
    .contact-main {
      background: #0b0b0b;
      padding-top: 4rem;
      padding-bottom: 6rem;
    }
    .contact-grid {
      display: grid;
      grid-template-columns: 1fr 1.2fr;
      gap: 4rem;
      align-items: start;
    }
    /* left info */
    .info-card {
      background: #111;
      border-radius: 40px;
      padding: 3rem;
      box-shadow: 0 30px 40px -20px #000;
      border: 1px solid #2a2a2a;
    }
    .info-card h3 {
      font-size: 2rem;
      font-family: 'Playfair Display', serif;
      margin-bottom: 2rem;
    }
    .info-item {
      display: flex;
      align-items: center;
      gap: 1.5rem;
      margin-bottom: 2rem;
    }
    .info-item i {
      font-size: 2rem;
      color: #d4af37;
      width: 2.5rem;
    }
    .info-item p, .info-item a {
      color: #f5f5f5;
      text-decoration: none;
      font-size: 1.2rem;
      font-weight: 300;
      transition: color 0.2s;
    }
    .info-item a:hover { color: #d4af37; }
    .social-mini {
      display: flex;
      gap: 1.5rem;
      margin-top: 2.5rem;
    }
    .social-mini a {
      color: #f5f5f5;
      font-size: 1.8rem;
      transition: color 0.2s;
    }
    .social-mini a:hover { color: #d4af37; }

    /* map container */
    .map-container {
      margin-top: 2rem;
      border-radius: 30px;
      overflow: hidden;
      height: 220px;
      border: 2px solid #d4af37;
    }
    .map-container iframe {
      width: 100%;
      height: 100%;
      filter: grayscale(1) invert(0.9) brightness(0.8);
    }

    /* right form */
    .form-card {
      background: #111;
      border-radius: 40px;
      padding: 3rem;
      box-shadow: 0 30px 40px -20px #000;
      border: 1px solid #2a2a2a;
    }
    .form-card h3 {
      font-size: 2rem;
      font-family: 'Playfair Display', serif;
      margin-bottom: 2rem;
    }
    .input-group {
      margin-bottom: 1.8rem;
      position: relative;
    }
    .input-group input,
    .input-group textarea {
      width: 100%;
      padding: 1rem 1.5rem;
      background: #1f1f1f;
      border: 1px solid #333;
      border-radius: 60px;
      font-size: 1rem;
      color: #f5f5f5;
      transition: border-color 0.3s, box-shadow 0.3s;
      outline: none;
      font-family: 'Inter', sans-serif;
    }
    .input-group textarea {
      border-radius: 30px;
      resize: vertical;
      min-height: 120px;
    }
    .input-group input:focus,
    .input-group textarea:focus {
      border-color: #d4af37;
      box-shadow: 0 0 0 3px rgba(212,175,55,0.2);
    }
    .input-group label {
      position: absolute;
      left: 1.5rem;
      top: 50%;
      transform: translateY(-50%);
      background: #1f1f1f;
      padding: 0 0.5rem;
      color: #aaa;
      font-size: 1rem;
      transition: 0.2s;
      pointer-events: none;
    }
    .input-group.textarea label {
      top: 1.5rem;
      transform: none;
    }
    .input-group.focused label,
    .input-group input:not(:placeholder-shown) + label,
    .input-group textarea:not(:placeholder-shown) + label {
      top: 0;
      font-size: 0.8rem;
      color: #d4af37;
    }
    /* hide placeholder visually but keep for detection */
    .input-group input::placeholder,
    .input-group textarea::placeholder {
      color: transparent;
    }
    .submit-btn {
      width: 100%;
      padding: 1.2rem;
      font-size: 1.3rem;
      border: none;
      background: #d4af37;
      color: #0b0b0b;
      border-radius: 60px;
      font-weight: 700;
      cursor: pointer;
      transition: 0.3s;
      border: 2px solid #d4af37;
    }
    .submit-btn:hover {
      background: transparent;
      color: #d4af37;
    }

    /* footer (same as index) */
    .footer {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 2rem 4rem;
      background: #0b0b0b;
      border-top: 1px solid #222;
      flex-wrap: wrap;
      gap: 1rem;
    }
    .footer-left { font-size: 1rem; opacity: 0.8; }
    .footer-right { display: flex; gap: 1.5rem; }
    .footer-right a { color: #f5f5f5; font-size: 1.2rem; transition: color 0.2s; }
    .footer-right a:hover { color: #d4af37; }

    /* responsiveness */
    @media (max-width: 900px) {
      .contact-grid { grid-template-columns: 1fr; }
      .contact-main { padding: 4rem 1.5rem; }
      .info-card, .form-card { padding: 2rem; }
    }
    @media (max-width: 600px) {
      .footer { flex-direction: column; text-align: center; }
    }
  </style>
</head>
<body>
  <!-- NAVBAR (identical) -->
  <nav class="navbar" id="navbar">
    <div class="logo">PUZZ</div>
    <div class="nav-links">
      <a href="index.html">Home</a>
      <a href="gallery.html">Gallery</a>
      <a href="index.html#about">About</a>
      <a href="contact.html">Contact</a>
    </div>
    <div class="hamburger" id="hamburger">
      <span></span><span></span><span></span>
    </div>
  </nav>
  <div class="mobile-menu" id="mobileMenu">
    <span class="close-btn" id="closeMenu">&times;</span>
    <a href="index.html">Home</a>
    <a href="gallery.html">Gallery</a>
    <a href="index.html#about">About</a>
    <a href="contact.html">Contact</a>
  </div>

   <!-- gallery hero -->
  <section class="gallery-hero">
    <div class="gallery-hero-bg">
      <img src="./images/jamie-street-qWYvQMIJyfE-unsplash.jpg" alt="gallery background">
    </div>
    <div class="hero-overlay"></div>
    <div class="gallery-hero-content">
      <h1>Contact <span>Us</span></h1>
      <p>Tell your story. We’ll frame it forever.</p>
    </div>
  </section>

  <!-- MAIN CONTACT AREA -->
  <section class="contact-main">
    <div class="container contact-grid">
      <!-- left side: info -->
      <div class="info-card">
        <h3>Reach us</h3>
        <div class="info-item">
          <i class="fas fa-map-marker-alt"></i>
          <p>Accra, Ghana · available worldwide</p>
        </div>
        <div class="info-item">
          <i class="fas fa-envelope"></i>
          <a href="mailto:hello@puzz.photo">hello@puzz.photo</a>
        </div>
        <div class="info-item">
          <i class="fas fa-phone-alt"></i>
          <a href="tel:+233201234567">+233 20 123 4567</a>
        </div>
        <div class="social-mini">
          <a href="#"><i class="fab fa-instagram"></i></a>
          <a href="#"><i class="fab fa-facebook-f"></i></a>
          <a href="#"><i class="fab fa-twitter"></i></a>
          <a href="#"><i class="fab fa-youtube"></i></a>
        </div>
        <!-- small map -->
        <div class="map-container">
          <iframe src="https://www.google.com/maps/embed?pb=!1m18!1m12!1m3!1d127073.29956900856!2d-0.21756908359375!3d5.603716800000015!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f13.1!3m3!1m2!1s0xfdf9084b2b1d6b7%3A0x8a8b5d2f7a8b9c0!2sAccra%2C%20Ghana!5e0!3m2!1sen!2s!4v1610000000000!5m2!1sen!2s" loading="lazy" referrerpolicy="no-referrer-when-downgrade"></iframe>
        </div>
      </div>

      <!-- right side: form -->
      <div class="form-card">
        <h3>Send a message</h3>
        <form id="contactForm" onsubmit="event.preventDefault(); alert('Message sent (demo)');">
          <div class="input-group">
            <input type="text" id="name" placeholder=" " required>
            <label for="name">Full name</label>
          </div>
          <div class="input-group">
            <input type="email" id="email" placeholder=" " required>
            <label for="email">Email address</label>
          </div>
          <div class="input-group">
            <input type="tel" id="phone" placeholder=" ">
            <label for="phone">Phone (optional)</label>
          </div>
          <div class="input-group textarea">
            <textarea id="message" placeholder=" " rows="5" required></textarea>
            <label for="message">Tell us about your event</label>
          </div>
          <button type="submit" class="submit-btn">Send message</button>
        </form>
      </div>
    </div>
  </section>

  <!-- FOOTER (same) -->
  <footer class="footer">
    <div class="footer-left">© PUZZ photography · memory weavers</div>
    <div class="footer-right">
      <a href="#"><i class="fab fa-instagram"></i></a>
      <a href="#"><i class="fab fa-facebook-f"></i></a>
      <a href="#"><i class="fab fa-twitter"></i></a>
      <a href="#"><i class="fab fa-youtube"></i></a>
    </div>
  </footer>

  <!-- SCRIPTS (GSAP, Lenis, mobile menu) -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>
  <script src="https://cdn.jsdelivr.net/gh/studio-freight/lenis@1.0.29/bundled/lenis.min.js"></script>
  <script>
    (function() {
      // navbar scroll effect
      const navbar = document.getElementById('navbar');
      window.addEventListener('scroll', ()=> {
        if (window.scrollY > 50) navbar.classList.add('scrolled');
        else navbar.classList.remove('scrolled');
      });

      // Lenis smooth scroll
      const lenis = new Lenis({ duration: 1.3 });
      function raf(time) { lenis.raf(time); requestAnimationFrame(raf); }
      requestAnimationFrame(raf);

      // mobile menu
      const hamburger = document.getElementById('hamburger');
      const mobileMenu = document.getElementById('mobileMenu');
      const closeBtn = document.getElementById('closeMenu');
      function openMenu() { mobileMenu.classList.add('active'); }
      function closeMenu() { mobileMenu.classList.remove('active'); }
      hamburger.addEventListener('click', openMenu);
      closeBtn.addEventListener('click', closeMenu);
      document.querySelectorAll('.mobile-menu a').forEach(link => link.addEventListener('click', closeMenu));

      // floating labels for form
      const inputs = document.querySelectorAll('.input-group input, .input-group textarea');
      inputs.forEach(input => {
        input.addEventListener('focus', () => {
          input.parentElement.classList.add('focused');
        });
        input.addEventListener('blur', () => {
          if (input.value === '') {
            input.parentElement.classList.remove('focused');
          }
        });
        // set initial if pre-filled
        if (input.value !== '') {
          input.parentElement.classList.add('focused');
        }
      });

      // GSAP entrance animations
       gsap.from('.gallery-hero-content h1', { y: 50, opacity: 0, duration: 1.5, ease: 'power3.out' });
      gsap.from('.gallery-hero-content p', { y: 30, opacity: 0, duration: 1.2, delay: 0.4, ease: 'power3.out' });
      gsap.from('.info-card', { x: -50, opacity: 0, duration: 1, scrollTrigger: { trigger: '.info-card', start: 'top 80%' } });
      gsap.from('.form-card', { x: 50, opacity: 0, duration: 1, scrollTrigger: { trigger: '.form-card', start: 'top 80%' } });
    })();
  </script>
</body>
</html>
